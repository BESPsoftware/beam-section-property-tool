name: CMake

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSPT_QT_VERSION=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Run examples
        shell: bash
        run: |
          ./build/Library/bin/example1_parametric
          ./build/Library/bin/example2_canvas
          ./build/Library/bin/example3_dll_batch
